name: Build LaTeX examples

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build package documentation and examples
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: latest
          scheme: full
          run: |
            latex -interaction=nonstopmode -halt-on-error boustrophedon.ins
            xelatex -interaction=nonstopmode -halt-on-error boustrophedon.dtx
            cp boustrophedon.sty examples/
            cd examples
            xelatex -interaction=nonstopmode -halt-on-error boustrophedon_demos.tex
            xelatex -interaction=nonstopmode -halt-on-error boustrophedon_template.tex
