name: Build LaTeX examples

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX Live packages
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-recommended texlive-latex-extra texlive-fonts-extra

      - name: Build demo
        run: xelatex -interaction=nonstopmode -halt-on-error examples/boustrophidon_demos.tex

      - name: Build template
        run: xelatex -interaction=nonstopmode -halt-on-error examples/boustrophidon_template.tex
