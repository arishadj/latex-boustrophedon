name: Build LaTeX examples

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build package documentation and examples
        run: |
          docker run --rm -v "$PWD":/work -w /work ghcr.io/xu-cheng/texlive-debian:latest sh -c '
            fail_ci() {
              echo "::error file=.github/workflows/latex.yml,line=16::$1"
              exit 1
            }

            fail_with_log() {
              log_file="$1"
              message="$(grep -m 1 -E "^!|LaTeX Error|Fatal error|Emergency stop|not found" "$log_file" || true)"
              if [ -z "$message" ]; then
                message="LaTeX build failed; see the workflow log."
              fi
              echo "::error file=.github/workflows/latex.yml,line=27::$message"
              cat "$log_file"
              exit 1
            }

            command -v latex || fail_ci "latex executable not found in TeX Live container"
            command -v xelatex || fail_ci "xelatex executable not found in TeX Live container"
            for tex_file in article.cls ltxdoc.cls xparse.sty expl3.sty graphicx.sty iftex.sty geometry.sty fontspec.sty greek6cbc.sty greek4cbc.sty; do
              kpsewhich "$tex_file" || fail_ci "$tex_file not found in TeX Live container"
            done

            latex -interaction=nonstopmode -halt-on-error boustrophedon.ins || fail_with_log boustrophedon.log
            xelatex -interaction=nonstopmode -halt-on-error boustrophedon.dtx || fail_with_log boustrophedon.log
            cp boustrophedon.sty examples/
            cd examples
            xelatex -interaction=nonstopmode -halt-on-error boustrophedon_demos.tex || fail_with_log boustrophedon_demos.log
            xelatex -interaction=nonstopmode -halt-on-error boustrophedon_template.tex || fail_with_log boustrophedon_template.log
          '
