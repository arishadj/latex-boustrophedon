name: Build LaTeX examples

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build package documentation
        uses: xu-cheng/latex-action@v4
        with:
          root_file: boustrophedon.dtx
          compiler: xelatex
          args: -interaction=nonstopmode -halt-on-error
          pre_compile: |
            latex -interaction=nonstopmode -halt-on-error boustrophedon.ins

      - name: Prepare example package file
        run: |
          test -f boustrophedon.sty
          cp boustrophedon.sty examples/
          ls -l boustrophedon.sty examples/boustrophedon.sty

      - name: Build package examples
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            examples/boustrophedon_demos.tex
            examples/boustrophedon_template.tex
          work_in_root_file_dir: true
          compiler: xelatex
          args: -interaction=nonstopmode -halt-on-error
