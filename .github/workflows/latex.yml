name: Build LaTeX examples

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX Live packages
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-latex-recommended texlive-latex-extra texlive-lang-greek fonts-dejavu-core

      - name: Generate package from docstrip installer
        run: latex -interaction=nonstopmode -halt-on-error boustrophedon.ins

      - name: Build package manual
        run: xelatex -interaction=nonstopmode -halt-on-error boustrophedon.dtx

      - name: Build demo
        run: TEXINPUTS=".:$GITHUB_WORKSPACE//:" xelatex -interaction=nonstopmode -halt-on-error -output-directory=examples examples/boustrophedon_demos.tex

      - name: Build template
        run: TEXINPUTS=".:$GITHUB_WORKSPACE//:" xelatex -interaction=nonstopmode -halt-on-error -output-directory=examples examples/boustrophedon_template.tex
